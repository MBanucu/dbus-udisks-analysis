name: Run analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Py${{ matrix.python-version }} / ${{ matrix.group }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        group:
          - group-a
          - group-b
          - group-c
          - group-d
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project
        run: python -m pip install -e .

      - name: Allow udisks2 for CI user
        run: |
          sudo mkdir -p /etc/polkit-1/rules.d
          sudo tee /etc/polkit-1/rules.d/10-udisks-ci.rules << 'POLKIT'
          polkit.addRule(function(action, subject) {
              if (action.id.indexOf("org.freedesktop.udisks2.") == 0) {
                  return polkit.Result.YES;
              }
          });
          POLKIT

      - name: Ensure UDisks2 is running
        run: |
          sudo losetup -D 2>/dev/null || true
          sudo pkill -9 udisksd 2>/dev/null || true
          sudo systemctl stop udisks2 2>/dev/null || true
          sleep 2
          sudo systemctl reset-failed udisks2 2>/dev/null || true
          sudo systemctl start udisks2 2>/dev/null || true
          sleep 5
          busctl --system call org.freedesktop.DBus /org/freedesktop/DBus org.freedesktop.DBus NameHasOwner s org.freedesktop.UDisks2
          udisksctl dump > /dev/null 2>&1 || echo "WARNING: udisksctl dump failed, tests may skip"
          sudo modprobe loop 2>/dev/null || true

      - name: Run ${{ matrix.group }} tests
        run: |
          case "${{ matrix.group }}" in
            group-a)
              python -m unittest tests.test_dbus_diagnostics tests.test_fix_verification tests.test_timing -v
              ;;
            group-b)
              python -m unittest tests.test_raw_signals tests.test_loop_lifecycle tests.test_mount_unmount -v
              ;;
            group-c)
              python -m unittest tests.test_backend_comparison tests.test_concurrent_ops tests.test_connection_stress -v
              ;;
            group-d)
              python -m unittest tests.test_zz_udisks2_limits tests.test_zz_recovery tests.test_zz_crash_monitor -v
              ;;
          esac

      - name: Collect system logs (post-test forensics)
        if: always()
        run: |
          mkdir -p results/system-logs
          journalctl -u udisks2 --no-pager -n 500 2>/dev/null > results/system-logs/journal-udisks2.txt || true
          journalctl -k --no-pager -n 500 2>/dev/null > results/system-logs/journal-kernel.txt || true
          dmesg 2>/dev/null > results/system-logs/dmesg.txt || true
          systemctl status udisks2 --no-pager -l 2>/dev/null > results/system-logs/systemctl-status.txt || true
          busctl tree org.freedesktop.UDisks2 2>/dev/null > results/system-logs/busctl-tree.txt || true
          losetup -a 2>/dev/null > results/system-logs/losetup.txt || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: results-py${{ matrix.python-version }}-${{ matrix.group }}
          path: results/
          retention-days: 30

  report:
    name: Generate report
    needs: [test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: all-results
          merge-multiple: false

      - name: Build summary
        run: |
          echo "# dbus-udisks-analysis Results" > summary.md
          echo "" >> summary.md
          echo "Workflow: ${{ github.workflow }}" >> summary.md
          echo "Run: ${{ github.run_id }}" >> summary.md
          echo "Date: $(date)" >> summary.md
          echo "" >> summary.md
          echo "## Artifacts" >> summary.md
          find all-results -name "*.json" | sort | while read f; do
            count=$(python -c "import json; d=json.load(open('$f')); print(d.get('total_signals', d.get('event_count', '?')))" 2>/dev/null || echo "?")
            echo "- **$(basename $(dirname $f))**: $f ($count events)" >> summary.md
          done
          echo "" >> summary.md
          echo "## Crash Evidence" >> summary.md
          echo "" >> summary.md
          find all-results -name "crash_evidence.md" -o -name "crash_analysis_final.json" | sort | while read f; do
            echo "### $(basename $(dirname $f)): $(basename $f)" >> summary.md
          done
          echo "" >> summary.md
          echo "## System Logs" >> summary.md
          echo "" >> summary.md
          find all-results -path "*/system-logs/*" | sort | while read f; do
            echo "- $(basename $(dirname $f))/$(basename $f)" >> summary.md
          done

      - name: Upload summary
        uses: actions/upload-artifact@v7
        with:
          name: summary
          path: summary.md
          retention-days: 30

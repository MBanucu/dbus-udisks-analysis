name: Run analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  analyze:
    name: ubuntu-latest / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project
        run: python -m pip install -e .

      - name: Allow udisks2 for CI user
        run: |
          sudo mkdir -p /etc/polkit-1/rules.d
          sudo tee /etc/polkit-1/rules.d/10-udisks-ci.rules << 'POLKIT'
          polkit.addRule(function(action, subject) {
              if (action.id.indexOf("org.freedesktop.udisks2.") == 0) {
                  return polkit.Result.YES;
              }
          });
          POLKIT

      - name: Print system info
        run: |
          echo "=== Python ==="
          python --version
          echo "=== dbus-fast ==="
          python -c "from importlib.metadata import version; print(version('dbus-fast'))"
          echo "=== UDisks2 ==="
          dpkg -l udisks2 2>/dev/null || echo "not installed"
          echo "=== D-Bus daemon ==="
          ps --no-headers -eo comm,pid | grep -E 'dbus-(daemon|broker)' || echo "unknown"
          echo "=== udisksctl ==="
          which udisksctl && udisksctl dump 2>&1 | head -5 || echo "not available"

      - name: Loop device diagnostics
        run: |
          echo "=== loop kernel module ==="
          lsmod | grep loop || echo "loop module not loaded"
          echo "=== max_loop ==="
          cat /sys/module/loop/parameters/max_loop 2>/dev/null || echo "unknown (no /sys/module/loop)"
          echo "=== /dev/loop* ==="
          ls -la /dev/loop* 2>/dev/null | wc -l
          ls -la /dev/loop0 /dev/loop1 /dev/loop2 2>/dev/null || echo "no numbered loop devices"
          echo "=== loop-control ==="
          ls -la /dev/loop-control 2>/dev/null || echo "no /dev/loop-control"
          echo "=== losetup ==="
          losetup -a 2>/dev/null | head -5 || echo "no loop devices attached"
          echo "=== loop device stress test ==="
          for i in $(seq 1 5); do
            IMG=$(mktemp /tmp/loop-diag-XXXXXX.img)
            dd if=/dev/zero of="$IMG" bs=1M count=1 2>/dev/null
            mkfs.vfat "$IMG" 2>/dev/null
            echo -n "  cycle $i: "
            udisksctl loop-setup -f "$IMG" --no-user-interaction 2>&1 || echo "FAILED"
            rm -f "$IMG"
          done
          echo "=== remaining loop devices ==="
          losetup -a 2>/dev/null | wc -l
          echo "=== udisksctl monitor preamble ==="
          timeout 3 udisksctl monitor 2>&1 | head -10 || true

      - name: Run analysis
        run: python -m unittest discover -s tests -v

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: results-py${{ matrix.python-version }}
          path: results/
          retention-days: 30

  report:
    name: Generate report
    needs: [analyze]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: all-results
          merge-multiple: false

      - name: Build summary
        run: |
          echo "# dbus-udisks-analysis Results" > summary.md
          echo "" >> summary.md
          echo "Workflow: ${{ github.workflow }}" >> summary.md
          echo "Run: ${{ github.run_id }}" >> summary.md
          echo "Date: $(date)" >> summary.md
          echo "" >> summary.md
          echo "## Artifacts" >> summary.md
          find all-results -name "*.json" | sort | while read f; do
            count=$(python -c "import json; d=json.load(open('$f')); print(d.get('total_signals', d.get('total_signals', '?')))" 2>/dev/null || echo "?")
            echo "- **$(basename $(dirname $f))**: $f ($count events)" >> summary.md
          done

      - name: Upload summary
        uses: actions/upload-artifact@v5
        with:
          name: summary
          path: summary.md
          retention-days: 30
